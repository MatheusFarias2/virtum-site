<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 170" role="img" aria-labelledby="title desc">
  <title id="title">Virtum Ecossistema</title>
  <desc id="desc">Logo vetorial da Virtum com símbolo em V tecnológico e texto Virtum Ecossistema.</desc>
  <defs>
    <linearGradient id="v-blue" x1="20" y1="30" x2="150" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1325"/>
      <stop offset="0.32" stop-color="#155cff"/>
      <stop offset="0.58" stop-color="#28d9ff"/>
      <stop offset="1" stop-color="#091427"/>
    </linearGradient>
    <linearGradient id="v-deep" x1="14" y1="42" x2="106" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17243a"/>
      <stop offset="0.45" stop-color="#0b1427"/>
      <stop offset="1" stop-color="#020716"/>
    </linearGradient>
    <linearGradient id="circuit" x1="92" y1="42" x2="184" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35e8ff"/>
      <stop offset="0.45" stop-color="#258bff"/>
      <stop offset="1" stop-color="#57eaff"/>
    </linearGradient>
    <linearGradient id="word" x1="220" y1="68" x2="655" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9fb7e7"/>
      <stop offset="0.34" stop-color="#d5e5ff"/>
      <stop offset="0.72" stop-color="#7183a6"/>
      <stop offset="1" stop-color="#d7e6ff"/>
    </linearGradient>
    <linearGradient id="sub" x1="230" y1="128" x2="548" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d67ff"/>
      <stop offset="0.52" stop-color="#38e4ff"/>
      <stop offset="1" stop-color="#1d67ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="170%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.45 0 0 0 0 1 0 0 0 .45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#020714" flood-opacity=".55"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <path d="M22 34 H58 L98 107 L142 24 H174 L110 146 C104 158 85 158 78 146 Z"
          fill="url(#v-deep)" opacity=".98"/>
    <path d="M57 34 H92 L118 83 L150 24 H181 L114 151 C108 162 90 162 84 151 L47 82 H75 L100 127 L135 60 L119 60 L100 96 Z"
          fill="url(#v-blue)"/>
    <path d="M73 34 H94 L119 82 L104 111 Z" fill="#1f7cff" opacity=".42"/>
    <path d="M91 104 L119 82 L112 96 L100 127 Z" fill="#2ee6ff" opacity=".72"/>
  </g>

  <g fill="none" stroke="url(#circuit)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M114 73 L144 28 H171"/>
    <path d="M123 93 L151 68 H184"/>
    <path d="M111 118 L145 112"/>
  </g>

  <g fill="#081225" stroke="#5ceaff" stroke-width="7" filter="url(#glow)">
    <circle cx="185" cy="28" r="13"/>
    <circle cx="198" cy="68" r="13"/>
    <circle cx="160" cy="112" r="13"/>
  </g>

  <g>
    <text x="226" y="103"
          font-family="Orbitron, Rajdhani, Eurostile, Segoe UI, Arial, sans-serif"
          font-size="60"
          font-weight="800"
          letter-spacing="7"
          fill="url(#word)">VIRTUM</text>
    <line x1="230" y1="128" x2="282" y2="128" stroke="url(#sub)" stroke-width="3" stroke-linecap="round"/>
    <text x="304" y="135"
          font-family="Montserrat, Rajdhani, Segoe UI, Arial, sans-serif"
          font-size="16"
          font-weight="800"
          letter-spacing="16"
          fill="url(#sub)">ECOSSISTEMA</text>
    <line x1="585" y1="128" x2="637" y2="128" stroke="url(#sub)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
